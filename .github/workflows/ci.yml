name: Java CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Checkstyle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run Checkstyle
        run: mvn -B checkstyle:check -s .github/maven-settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build & Test
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn -B verify -s .github/maven-settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

  publish:
    name: Build, Scan & Push
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: wilddog64/shopping-cart-infra/.github/workflows/build-push-deploy.yml@39c3072759bf7da92ec8cd08653e67d7f62d4032
    with:
      service-name: shopping-cart-order
      image-name: ghcr.io/wilddog64/shopping-cart-order
    permissions:
      contents: write
      packages: write
    secrets:
      PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
