name: Java CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn -B verify

  publish:
    name: Build, Scan & Push
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: wilddog64/shopping-cart-infra/.github/workflows/build-push-deploy.yml@0a28d10
    with:
      service-name: shopping-cart-order
      image-name: ghcr.io/wilddog64/shopping-cart-order
    permissions:
      contents: write
      packages: write
