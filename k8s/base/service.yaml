---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: shopping-cart
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
---
# NodePort service for development access
apiVersion: v1
kind: Service
metadata:
  name: order-service-nodeport
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: shopping-cart
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: http
    nodePort: 30081
    protocol: TCP
  selector:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
