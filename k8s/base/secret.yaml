---
# Database credentials - In production, use ExternalSecrets with Vault
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secrets
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: shopping-cart
type: Opaque
stringData:
  # Database credentials (for development only)
  # In production, these come from Vault via ExternalSecrets
  DB_USERNAME: "postgres"
  DB_PASSWORD: "changeme"

  # RabbitMQ credentials (for development only)
  # In production, these come from Vault dynamically
  RABBITMQ_USERNAME: "guest"
  RABBITMQ_PASSWORD: "guest"
