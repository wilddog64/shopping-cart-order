---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: shopping-cart-apps
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: shopping-cart
data:
  # Application settings
  SERVER_PORT: "8080"
  SPRING_PROFILES_ACTIVE: "kubernetes"

  # Database connection (host only, credentials from secret)
  DB_HOST: "postgresql-orders.shopping-cart-data.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "orders"

  # RabbitMQ connection
  RABBITMQ_HOST: "rabbitmq.shopping-cart-data.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"

  # Vault integration
  VAULT_ENABLED: "true"
  VAULT_ADDR: "http://vault.vault.svc.cluster.local:8200"
  VAULT_ROLE: "order-publisher"
  VAULT_RABBITMQ_PATH: "rabbitmq"

  # Rate limiting
  RATE_LIMIT_PER_MINUTE: "100"
  RATE_LIMIT_PER_SECOND: "20"
  RATE_LIMIT_BURST: "50"

  # Logging
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_SHOPPINGCART: "DEBUG"

  # OAuth2/OIDC Configuration (Keycloak SSO)
  OAUTH2_ENABLED: "true"
  OAUTH2_ISSUER_URI: "http://keycloak.identity.svc.cluster.local/realms/shopping-cart"
  OAUTH2_JWK_SET_URI: "http://keycloak.identity.svc.cluster.local/realms/shopping-cart/protocol/openid-connect/certs"
